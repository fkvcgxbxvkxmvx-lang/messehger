<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            background: #f0f2f5;
            min-height: 100vh;
        }
        body.dark { background: #1a1a1a; color: #eee; }
        body.dark .card { background: #2d2d2d; }
        body.dark button { background: #3d3d3d; color: #eee; }
        h2 { margin-bottom: 16px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stats {
            display: flex;
            gap: 12px;
            text-align: center;
        }
        .stat-item {
            flex: 1;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        body.dark .stat-item { background: #3d3d3d; }
        .stat-value { font-size: 28px; font-weight: bold; color: #4CAF50; }
        .stat-label { font-size: 14px; opacity: 0.7; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        body.dark th, body.dark td { border-bottom-color: #555; }
        button {
            padding: 8px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        button.danger { background: #f44336; }
        button.small { padding: 4px 8px; font-size: 12px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        body.dark input { background: #3d3d3d; color: #eee; border-color: #555; }
        #login-box, #admin-content { display: none; }
        #login-box.active, #admin-content.active { display: block; }
    </style>
</head>
<body>
<div id="login-box" class="active card">
    <h2>👑 Админ-панель</h2>
    <input type="password" id="admin-password" placeholder="Пароль" autocomplete="off">
    <button onclick="login()">Войти</button>
    <p id="login-error" style="color: #f44336; margin-top: 8px;"></p>
</div>

<div id="admin-content" class="card">
    <h2>👑 Управление</h2>
    <div class="stats" id="stats"></div>
    
    <h3 style="margin: 20px 0 12px;">🏠 Комнаты</h3>
    <div id="rooms-table"></div>
    
    <h3 style="margin: 20px 0 12px;">👥 Пользователи</h3>
    <div id="users-table"></div>
    
    <button onclick="logout()" style="margin-top: 20px; background: #607d8b;">Выйти</button>
</div>

<script>
let isAdmin = sessionStorage.getItem('admin') === 'true';

if (isAdmin) {
    showAdminPanel();
}

async function login() {
    const pass = document.getElementById('admin-password').value;
    const resp = await fetch('/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pass})
    });
    if (resp.ok) {
        sessionStorage.setItem('admin', 'true');
        showAdminPanel();
    } else {
        document.getElementById('login-error').textContent = 'Неверный пароль';
    }
}

async function showAdminPanel() {
    document.getElementById('login-box').classList.remove('active');
    document.getElementById('admin-content').classList.add('active');
    await loadStats();
    await loadRooms();
    await loadUsers();
}

async function loadStats() {
    const resp = await fetch('/admin/stats');
    const data = await resp.json();
    document.getElementById('stats').innerHTML = `
        <div class="stat-item"><div class="stat-value">${data.users}</div><div class="stat-label">Пользователей</div></div>
        <div class="stat-item"><div class="stat-value">${data.rooms}</div><div class="stat-label">Комнат</div></div>
        <div class="stat-item"><div class="stat-value">${data.messages}</div><div class="stat-label">Сообщений</div></div>
    `;
}

async function loadRooms() {
    const resp = await fetch('/admin/rooms');
    const rooms = await resp.json();
    let html = '<table><tr><th>Комната</th><th>Создатель</th><th>Участников</th><th></th></tr>';
    rooms.forEach(r => {
        html += `<tr><td>${escapeHtml(r.room_id)}</td><td>${escapeHtml(r.creator)}</td><td>${r.participants}</td>
            <td><button class="danger small" onclick="deleteRoomAdmin('${escapeHtml(r.room_id)}')">🗑️</button></td></tr>`;
    });
    html += '</table>';
    document.getElementById('rooms-table').innerHTML = html || '<p>Нет комнат</p>';
}

async function loadUsers() {
    const resp = await fetch('/admin/users');
    const users = await resp.json();
    let html = '<table><tr><th>Пользователь</th><th>Комнат</th><th>Активность</th></tr>';
    users.forEach(u => {
        html += `<tr><td>${escapeHtml(u.username)}</td><td>${u.rooms}</td><td>${u.last_active ? new Date(u.last_active).toLocaleDateString() : '—'}</td></tr>`;
    });
    html += '</table>';
    document.getElementById('users-table').innerHTML = html || '<p>Нет пользователей</p>';
}

async function deleteRoomAdmin(room) {
    if (!confirm('Удалить комнату ' + room + ' навсегда?')) return;
    await fetch('/delete_room', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({room, isAdmin: true})
    });
    loadStats();
    loadRooms();
}

function logout() {
    sessionStorage.removeItem('admin');
    location.reload();
}

function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}
</script>
</body>
</html>
