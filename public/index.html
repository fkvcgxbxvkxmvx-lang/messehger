<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }
        body.dark { background: #1a1a1a; color: #eee; }
        body.dark .box { background: #2d2d2d; }
        body.dark input, body.dark button, body.dark select { background: #3d3d3d; color: #eee; border-color: #555; }
        body.dark #chat { background: #1e1e1e; }
        body.dark .other-message { background: #2d2d2d; }
        body.dark .my-message { background: #1b5e20; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }
        .screen { display: none; flex-direction: column; height: 100%; padding: 8px; }
        .screen.active { display: flex; }
        
        h3 {
            font-size: 1.1rem;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .message {
            padding: 6px 10px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.3;
        }
        .my-message { background: #dcf8c6; align-self: flex-end; }
        .other-message { background: white; align-self: flex-start; border: 1px solid #e0e0e0; }
        
        .msg-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }
        .avatar { font-size: 14px; }
        .username { font-weight: 600; font-size: 12px; opacity: 0.8; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-left: auto; }
        
        .msg-content {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .msg-text { flex: 1; }
        
        input, button, select {
            padding: 10px 12px;
            margin-top: 4px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }
        button.danger { background: #f44336; }
        button.secondary { background: #607d8b; }
        .button-group { display: flex; gap: 4px; margin-top: 4px; }
        .button-group button { flex: 1; margin-top: 0; }
        
        .room-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 6px;
        }
        body.dark .room-item { background: #3d3d3d; }
        .room-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .room-name { font-weight: 500; flex: 1; }
        .unread-badge {
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 11px;
        }
        .room-actions {
            display: flex;
            gap: 6px;
        }
        .room-actions button {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            margin: 0;
        }
        
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        body.dark .profile-section { background: #3d3d3d; }
        #profile-avatar { font-size: 32px; }
        #profile-name { font-weight: 600; }
        
        .back-btn {
            background: transparent;
            color: #4CAF50;
            width: auto;
            padding: 6px 10px;
            margin-bottom: 4px;
        }
        .empty { text-align: center; color: #999; padding: 12px; }
        .header-actions { margin-left: auto; display: flex; gap: 4px; }
        .header-actions button { padding: 6px 10px; margin: 0; }
        
        .emoji-picker {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .emoji-btn {
            width: auto;
            padding: 6px 10px;
            font-size: 18px;
            background: transparent;
            color: inherit;
            border: 1px solid #ddd;
            margin: 0;
        }
        body.dark .emoji-btn { border-color: #555; }
        
        .settings-group {
            margin-top: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        body.dark .settings-group { background: #3d3d3d; }
        .settings-group label {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- ЭКРАН КОМНАТ -->
    <div id="rooms-screen" class="screen active">
        <h3>💬 Чаты <span class="header-actions"><button onclick="showSettings()">⚙️</button></span></h3>
        <div class="profile-section">
            <span id="profile-avatar">😎</span>
            <span id="profile-name">Гость</span>
        </div>
        <div id="rooms-list" style="flex:1; overflow-y:auto;"></div>
        <div class="button-group">
            <button onclick="showCreateRoom()">➕ Новая</button>
            <button onclick="showJoinRoom()">🔗 Войти</button>
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="screen">
        <button class="back-btn" onclick="backToRooms()">← Назад</button>
        <h3>
            <span>💬</span>
            <span id="room-name"></span>
            <span class="header-actions"><span id="current-user-badge"></span></span>
        </h3>
        <div id="chat"></div>
        
        <!-- Эмодзи-пикер -->
        <div class="emoji-picker" id="emoji-picker">
            <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
            <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
            <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
            <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
            <button class="emoji-btn" onclick="addEmoji('😮')">😮</button>
            <button class="emoji-btn" onclick="addEmoji('😢')">😢</button>
            <button class="emoji-btn" onclick="addEmoji('😡')">😡</button>
            <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
            <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
            <button class="emoji-btn" onclick="addEmoji('💯')">💯</button>
        </div>
        
        <input id="msg-input" type="text" placeholder="Сообщение..." maxlength="500">
        <div class="button-group">
            <button onclick="sendMessage()">📤</button>
            <button class="secondary" onclick="downloadChat()">📥</button>
            <button id="clear-btn" class="danger" onclick="clearHistory()" style="display:none;">🧹</button>
            <button class="danger" onclick="leaveCurrentRoom()">🚪</button>
        </div>
    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="settings-screen" class="screen">
        <button class="back-btn" onclick="backToRoomsFromSettings()">← Назад</button>
        <h3>⚙️ Настройки</h3>
        
        <div class="profile-section">
            <span id="settings-avatar">😎</span>
            <input id="settings-name" placeholder="Имя" maxlength="20">
        </div>
        
        <label>Выбери аватар:</label>
        <select id="settings-avatar-select" style="margin-top:4px;">
            <option value="😎">😎 Крутой</option>
            <option value="🐶">🐶 Пёс</option>
            <option value="🦊">🦊 Лис</option>
            <option value="🐱">🐱 Кот</option>
            <option value="🐼">🐼 Панда</option>
            <option value="👽">👽 Пришелец</option>
            <option value="🤖">🤖 Робот</option>
            <option value="👻">👻 Призрак</option>
            <option value="🐧">🐧 Пингвин</option>
            <option value="🦁">🦁 Лев</option>
            <option value="🐸">🐸 Лягушка</option>
            <option value="🐵">🐵 Обезьяна</option>
            <option value="🐔">🐔 Курица</option>
            <option value="🐮">🐮 Корова</option>
            <option value="🦄">🦄 Единорог</option>
            <option value="🐲">🐲 Дракон</option>
            <option value="🎃">🎃 Тыква</option>
            <option value="🤡">🤡 Клоун</option>
            <option value="💀">💀 Череп</option>
            <option value="👑">👑 Корона</option>
        </select>
        
        <div class="settings-group">
            <label>
                <input type="checkbox" id="dark-theme-toggle"> 🌙 Тёмная тема
            </label>
            <label style="margin-top:8px;">
                <input type="checkbox" id="sound-toggle" checked> 🔊 Звук при сообщениях
            </label>
        </div>
        
        <button onclick="saveSettings()" style="margin-top:12px;">💾 Сохранить</button>
        <button class="danger" onclick="resetAll()">🚪 Выйти из аккаунта</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentUser = localStorage.getItem("username") || "";
let currentAvatar = localStorage.getItem("avatar") || "😎";
let currentRoom = "";
let isCreator = false;
let rooms = [];
let soundEnabled = localStorage.getItem("soundEnabled") !== "false";
let lastMessageSound = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgYGBgYCAgICAf39/f39/f39/gICAf39/gICAf39/gICAf39/f39/f39/gICAf39/f39/f3+AgICAAAAA');

function init() {
    if (!currentUser) {
        currentUser = prompt("Твоё имя:", "Гость") || "Гость";
        localStorage.setItem("username", currentUser);
    }
    if (localStorage.getItem("darkTheme") === "true") {
        document.body.classList.add("dark");
        document.getElementById("dark-theme-toggle").checked = true;
    }
    document.getElementById("sound-toggle").checked = soundEnabled;
    updateProfile();
    loadRooms();
    setInterval(loadRooms, 3000);
    
    socket.on('new_message', (data) => {
        if (data.room === currentRoom) {
            addMessageToChat(data);
            if (soundEnabled && data.username !== currentUser) {
                lastMessageSound.play().catch(()=>{});
            }
        }
        loadRooms();
    });
}

function updateProfile() {
    document.getElementById("profile-name").textContent = currentUser;
    document.getElementById("profile-avatar").textContent = currentAvatar;
    document.getElementById("settings-avatar").textContent = currentAvatar;
    document.getElementById("settings-name").value = currentUser;
    document.getElementById("settings-avatar-select").value = currentAvatar;
    document.getElementById("current-user-badge").textContent = currentUser + ' ' + currentAvatar;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
}

async function loadRooms() {
    const resp = await fetch('/my_rooms?username=' + currentUser);
    rooms = await resp.json();
    const list = document.getElementById('rooms-list');
    if (rooms.length === 0) {
        list.innerHTML = '<div class="empty">Нет комнат</div>';
        return;
    }
    let html = '';
    for (const room of rooms) {
        const cr = await fetch('/creator?room=' + room.name).then(r => r.json());
        const isCreatorRoom = cr.creator === currentUser;
        html += `<div class="room-item">
            <div class="room-info">
                <span class="room-name">🏠 ${escapeHtml(room.name)}</span>
                ${room.unread ? `<span class="unread-badge">${room.unread}</span>` : ''}
            </div>
            <div class="room-actions">
                <button onclick="enterRoom('${escapeHtml(room.name)}')">Войти</button>
                <button class="danger" onclick="hideRoom('${escapeHtml(room.name)}')">Скрыть</button>
                ${isCreatorRoom ? `<button class="danger" onclick="deleteRoom('${escapeHtml(room.name)}')">🗑️</button>` : ''}
            </div>
        </div>`;
    }
    list.innerHTML = html;
}

async function enterRoom(room) {
    currentRoom = room;
    await fetch('/join_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:currentUser, room}) });
    await fetch('/mark_read', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:currentUser, room}) });
    socket.emit('join_room', room);
    showScreen('chat');
    document.getElementById('room-name').textContent = room;
    const cr = await fetch('/creator?room=' + room).then(r => r.json());
    isCreator = cr.creator === currentUser;
    document.getElementById('clear-btn').style.display = isCreator ? 'block' : 'none';
    loadMessages();
}

function addMessageToChat(msg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ' + (msg.username === currentUser ? 'my-message' : 'other-message');
    
    const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    
    div.innerHTML = `
        <div class="msg-header">
            <span class="avatar">${msg.username === currentUser ? currentAvatar : '😎'}</span>
            <span class="username">${escapeHtml(msg.username)}</span>
            <span class="msg-time">${time}</span>
        </div>
        <div class="msg-text">${escapeHtml(msg.text)}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function loadMessages() {
    const resp = await fetch('/messages?room=' + currentRoom);
    const data = await resp.json();
    const chat = document.getElementById('chat');
    chat.innerHTML = data.length ? '' : '<div class="empty">✨ Пусто</div>';
    data.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.username === currentUser ? 'my-message' : 'other-message');
        div.innerHTML = `
            <div class="msg-header">
                <span class="avatar">${msg.username === currentUser ? currentAvatar : '😎'}</span>
                <span class="username">${escapeHtml(msg.username)}</span>
                <span class="msg-time">--:--</span>
            </div>
            <div class="msg-text">${escapeHtml(msg.text)}</div>
        `;
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    await fetch('/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({room:currentRoom, username:currentUser, message:msg}) });
    input.value = '';
}

function addEmoji(emoji) {
    const input = document.getElementById('msg-input');
    input.value += emoji;
    input.focus();
}

async function hideRoom(room) {
    if (!confirm('Скрыть комнату ' + room + ' из списка?')) return;
    await fetch('/leave_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:currentUser, room}) });
    if (currentRoom === room) backToRooms();
    loadRooms();
}

async function deleteRoom(room) {
    if (!confirm('Удалить ' + room + ' навсегда?')) return;
    await fetch('/delete_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({room, username:currentUser}) });
    if (currentRoom === room) backToRooms();
    loadRooms();
}

async function clearHistory() {
    if (!isCreator) return alert('Только создатель');
    if (!confirm('Очистить историю?')) return;
    await fetch('/clear', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({room:currentRoom, username:currentUser}) });
    loadMessages();
}

function downloadChat() {
    fetch('/messages?room=' + currentRoom).then(r => r.json()).then(data => {
        let text = `Чат: ${currentRoom}\n${new Date().toLocaleString()}\n\n`;
        data.forEach(m => text += `${m.username}: ${m.text}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([text]));
        a.download = `chat_${currentRoom}.txt`;
        a.click();
    });
}

function leaveCurrentRoom() {
    if (currentRoom) {
        socket.emit('leave_room', currentRoom);
        backToRooms();
    }
}

function backToRooms() {
    socket.emit('leave_room', currentRoom);
    currentRoom = '';
    showScreen('rooms');
    loadRooms();
}

function showCreateRoom() { const r = prompt('Название комнаты:'); if (r) enterRoom(r); }
function showJoinRoom() { showCreateRoom(); }
function showSettings() { updateProfile(); showScreen('settings'); }
function backToRoomsFromSettings() { showScreen('rooms'); }

function saveSettings() {
    const name = document.getElementById('settings-name').value.trim();
    if (name) { currentUser = name; localStorage.setItem('username', name); }
    currentAvatar = document.getElementById('settings-avatar-select').value;
    localStorage.setItem('avatar', currentAvatar);
    
    const dark = document.getElementById('dark-theme-toggle').checked;
    localStorage.setItem('darkTheme', dark);
    document.body.classList.toggle('dark', dark);
    
    soundEnabled = document.getElementById('sound-toggle').checked;
    localStorage.setItem('soundEnabled', soundEnabled);
    
    updateProfile();
    showScreen('rooms');
    loadRooms();
}

function resetAll() { if (confirm('Выйти?')) { localStorage.clear(); location.reload(); } }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

document.getElementById('msg-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');
init();
</script>
</body>
</html>
